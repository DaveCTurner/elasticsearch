---
"get cluster state":
  - do:
      cluster.state:
        compressed_cluster_state_size: false

  - is_true: master_node

---
"get cluster state returns cluster state size with human readable format":
  - skip:
      features: "warnings"

  - do:
      warnings:
        - "Reporting the compressed cluster state size alongside the cluster state is deprecated and will be removed in the next major version."
      cluster.state:
        human: true

  - is_true: master_node
  - gte: { compressed_size_in_bytes: 50 }
  - is_true: compressed_size

---
"get cluster state suppresses cluster state size with flag":
  - do:
      cluster.state:
        compressed_cluster_state_size: false
        human: true

  - is_true: master_node
  - match: { compressed_size_in_bytes: null }
  - match: { compressed_size: null }

---
"get cluster state returns cluster_uuid at the top level":
  - skip:
      version:  " - 6.3.99"
      reason:   "cluster state including cluster_uuid at the top level is new in v6.4.0 and higher"

  - do:
      cluster.state:
        compressed_cluster_state_size: false
        human: true

  - is_true: cluster_uuid
  - is_true: master_node
