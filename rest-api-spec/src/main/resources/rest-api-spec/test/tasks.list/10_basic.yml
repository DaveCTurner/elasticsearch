---
"tasks_list test":
  - skip:
      version: " - 7.99.99"
      reason:  compressed_cluster_state_size added in 8.0

  - do:
      cluster.state:
        compressed_cluster_state_size: false

  # Get master node id
  - set: { master_node: master }

  - do:
      tasks.list: {}

  - is_true: nodes
  - is_true: nodes.$master.roles

  - do:
      tasks.list:
        group_by: parents

  - is_true: tasks

---
"tasks_list headers":
  - skip:
      version: " - 6.99.99"
      features: headers
      reason:  task headers has been added in 7.0.0

  - do:
      headers: { "X-Opaque-Id": "That is me" }
      tasks.list:
        actions: "cluster:monitor/tasks/lists"
        group_by: none

  - is_true: tasks
  - match: { tasks.0.headers.X-Opaque-Id: "That is me" }

