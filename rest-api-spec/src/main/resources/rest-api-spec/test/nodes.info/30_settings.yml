---
"node_info test flat_settings":
  - skip:
      version: " - 7.99.99"
      reason:  compressed_cluster_state_size added in 8.0

  - do:
      cluster.state:
        compressed_cluster_state_size: false

  - set: { master_node: master }

  - do:
      nodes.info:
        metric: [ settings ]

  - match : { nodes.$master.settings.client.type: node }

  - do:
      nodes.info:
        metric: [ settings ]
        flat_settings: true

  - match : { nodes.$master.settings.client\.type: node }
